name: Build release assets

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows release package
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install --prefer-binary -r requirements.txt

      - name: Build Windows binaries
        working-directory: windows
        run: python build.py

      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release\SteamlessKeyboard-windows | Out-Null
          Copy-Item -LiteralPath windows\dist\SteamlessKeyboard-windows.exe -Destination release\SteamlessKeyboard-windows\
          Copy-Item -LiteralPath windows\lockscreen-keyboard -Destination release\SteamlessKeyboard-windows\lockscreen-keyboard -Recurse
          Copy-Item -LiteralPath README.md,LICENSE -Destination release\SteamlessKeyboard-windows\
          Compress-Archive -Path release\SteamlessKeyboard-windows -DestinationPath SteamlessKeyboard-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamlessKeyboard-windows
          path: SteamlessKeyboard-windows.zip

      - name: Attach Windows artifact to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SteamlessKeyboard-windows.zip

  linux:
    name: Linux release package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-ayatanaappindicator3-0.1 \
            gir1.2-gtk-3.0 \
            gobject-introspection \
            libayatana-appindicator3-1 \
            libcairo2-dev \
            libgirepository1.0-dev \
            libgtk-3-0 \
            libhidapi-hidraw0 \
            libxkbcommon0 \
            pkg-config \
            python3-gi \
            python3-gi-cairo

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install --prefer-binary -r requirements.txt

      - name: Build Linux tarball
        working-directory: linux
        run: python build.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamlessKeyboard-linux
          path: linux/dist/SteamlessKeyboard-linux.tar.gz

      - name: Attach Linux artifact to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: linux/dist/SteamlessKeyboard-linux.tar.gz
