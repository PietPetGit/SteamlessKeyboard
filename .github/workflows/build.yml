# Builds the Windows and Linux release assets and attaches them to a GitHub
# Release when that release is published. This is the mechanism that makes the
# single-`main` + multi-asset model work — no per-platform branches needed.
#
# Each job builds one platform folder of the repo:
#   windows/  ->  SteamlessKeyboard-<tag>-windows.zip   (PyInstaller, build.py)
#   linux/    ->  SteamlessKeyboard-<tag>-linux.tar.gz  (PyInstaller, build_linux.py)
#
# The asset names MUST match whatever the release notes advertise.
#
# NOTE: these build steps were derived from windows/build.py and
# linux/build_linux.py but have not been run in CI yet — sanity-check the first
# release build, especially the Linux apt package list for your runner.

name: Build release assets

on:
  release:
    types: [published]   # runs when you publish a Release manually

permissions:
  contents: write        # needed to upload assets to the release

jobs:
  # ----------------------------------------------------------------------
  windows:
    name: Build Windows asset
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Build (Windows)
        run: python build.py          # -> windows/dist/SteamlessKeyboard-windows.exe

      - name: Package Windows asset
        shell: pwsh
        run: |
          $tag  = "${{ github.event.release.tag_name }}"
          $name = "SteamlessKeyboard-$tag-windows.zip"
          Compress-Archive -Path dist\* -DestinationPath $name -Force
          "ASSET=$name" >> $env:GITHUB_ENV

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$env:ASSET" --clobber

  # ----------------------------------------------------------------------
  linux:
    name: Build Linux asset
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system libraries
        # SDL2 + hidapi runtime libs and the GTK/AppIndicator stack PyGObject
        # binds to (build_linux.py forces the AppIndicator tray backend).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev pkg-config gcc \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-gfx-1.0-0 \
            libhidapi-hidraw0 libxkbcommon0 \
            libgirepository1.0-dev libcairo2-dev \
            gir1.2-gtk-3.0 gir1.2-ayatanaappindicator3-0.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Build (Linux)
        run: python build_linux.py     # -> linux/dist/SteamlessKeyboard-linux.exe

      - name: Package Linux asset
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="SteamlessKeyboard-$TAG-linux.tar.gz"
          tar -czf "$NAME" -C dist .
          echo "ASSET=$NAME" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$ASSET" --clobber
